name: restaurant_delivery_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  # ✅ Garante compatibilidade com Dart 3 e Null Safety
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ✅ LOCALIZAÇÃO
  flutter_localizations:
    sdk: flutter

  # ✅ PACOTES DE DESIGN E UTILITÁRIOS
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0
  
  # ✅ CORREÇÃO: Versão exigida pelo teu Flutter SDK
  intl: ^0.20.2 
  

  # ✅ NOVOS PACOTES PARA IMAGEM
  image_picker: ^1.2.1
  lottie: ^3.1.0
  url_launcher: ^6.3.2
  geolocator: ^12.0.0
  google_maps_flutter: ^2.5.0
  geocoding: ^2.1.0
  flutter_polyline_points: ^3.1.0
  http: ^1.6.0
  flutter_local_notifications: ^19.5.0
  flutter_stripe:  ^10.1.0
  shimmer: ^3.0.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^9.2.2
  flutter_usb_printer: ^0.1.0+1
  esc_pos_utils_plus: ^2.0.4
  permission_handler: ^11.0.1
  audioplayers: ^6.0.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  cloud_functions: ^6.0.7
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.1.2
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # Importante para ícones adaptativos recentes

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
